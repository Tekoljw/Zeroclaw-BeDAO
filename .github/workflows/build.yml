name: Build Zeroclaw for GLIBC 2.35

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04  # 使用Ubuntu 22.04确保GLIBC 2.35兼容性
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: ${{ matrix.target }}
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libssl-dev \
          build-essential
    
    - name: Build release binary
      run: |
        cargo build --release --target ${{ matrix.target }}
        ls -lh target/${{ matrix.target }}/release/zeroclaw
    
    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-${{ matrix.target }}
        path: target/${{ matrix.target }}/release/zeroclaw
        retention-days: 7
    
    - name: Create release package
      run: |
        mkdir -p release
        cp target/${{ matrix.target }}/release/zeroclaw release/
        strip release/zeroclaw 2>/dev/null || true
        tar -czf zeroclaw-${{ matrix.target }}.tar.gz -C release zeroclaw
        ls -lh *.tar.gz
    
    - name: Upload release package
      uses: actions/upload-artifact@v4
      with:
        name: zeroclaw-release-${{ matrix.target }}
        path: zeroclaw-${{ matrix.target }}.tar.gz
        retention-days: 7
    
    - name: Test binary compatibility
      run: |
        # 检查GLIBC版本要求
        objdump -T target/${{ matrix.target }}/release/zeroclaw | grep GLIBC | head -5 || true
        echo "GLIBC版本检查完成"
